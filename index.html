<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OVA Directory</title>
<link rel="stylesheet" href="styles.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<header>
  <h1>OVA Directory</h1>

  <input type="text" id="searchInput" placeholder="Search by title, genre, tags...">

  <div class="filters">
    <button onclick="filterTag('tentacles')">Tentacles</button>
    <button onclick="filterTag('monster')">Monster</button>
    <button onclick="filterTag('machine')">Machine</button>
    <button onclick="filterTag('3d')">3D</button>
    <button onclick="filterTag('romantico')">Romantico</button>
    <button onclick="filterTag('ecchi')">Ecchi</button>
    <button onclick="filterTag('hardcore')">Hardcore</button>
    <button onclick="filterTag('comedia')">Comedia</button>
    <button onclick="filterTag('futanari')">Futanari</button>
    <button onclick="filterTag('extras')">Extras</button>
  </div>
</header>

<!-- GRID PRINCIPAL -->
<main id="postsContainer"></main>

<!-- ================= DETALLE ================= -->
<section id="ovaDetail">

  <div class="detail-wrapper">

    <div class="detail-header">
      <div id="logo" onclick="goHome()">OVA Directory</div>
      <button id="closeDetail">X Close</button>
    </div>

    <div id="detailTitle" class="detail-title"></div>
    <hr class="detail-line">

    <div class="detail-body">

      <div class="main-image">
        <img id="detailMainImage" src="" alt="">
      </div>

      <div class="right-column">
        <div id="detailDescription"></div>

        <div id="detailThumbnails" class="thumbs-container"></div>

        <div class="view-episodes">VIEW EPISODES</div>

        <!-- JS llena esto -->
        <div id="detailButtons"></div>

      </div>
    </div>

    <!-- ESPACIO -->
    <div class="bottom-space"></div>

    <!-- FOOTER LEGAL SOLO EN DETALLE -->
    <div class="detail-footer">
      <div class="blue-line"></div>

      <div class="legal-links">
        <a href="uses.html">Uses</a>
        <a href="privacy.html">Privacy Policy</a>
        <a href="terms.html">Terms & Conditions</a>
        <a href="https://instagram.com/TU_USUARIO" target="_blank">Contact</a>
      </div>
    </div>

  </div>
</section>

<footer>
  <div class="counter">
    Visitors: <span id="visitCount">0</span>
  </div>
</footer>

<script src="data.js"></script>
<script src="script.js"></script>

<!-- POPADS -->
<script type="text/javascript">
  var _pop = _pop || [];
  _pop.push(['siteId', 'PON_AQUI_TU_SITE_ID']);
</script>
<script src="https://c1.popads.net/pop.js"></script>

</body>
</html>
